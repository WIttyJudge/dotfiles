# --- MAPPINGS ---

# Unbind default keys.
unbind C-b
unbind-key x # Unbind-key “x” from it’s current job of “ask and then close”.
unbind-key w # Ctrl-a-s more preferable to me.

# Set ctrl-a as a prefix
set -g prefix C-a
bind C-a send-prefix

bind-key x kill-pane     # Rebind-key it to just “close”
bind-key X kill-session  # Key combo for killing the entire session

bind s choose-session  # Simpler window to show only sessions
bind S choose-tree     # Expanded to show all splits

# Set vim key for copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# Reload the tmux config
bind-key r source-file ~/.tmux.conf \; display "Config Reloaded!"

# Project finder
# bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
bind-key -r f display-popup -E "~/.local/bin/tmux-sessionizer"

# --- OPTIONS ---

# Enable mouse support
set -g mouse on 

# Enable color support inside of tmux.
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",*256col*:Tc"

set -g base-index 1         # Windows index will start with 1
setw -g pane-base-index 1   # Pane index will start with 1
set-option -g renumber-windows on         

# Tmux adds a short, almost imperceptible delay between the commands that can 
# cause funny behavior when running vim inside tmux.
set-option -s escape-time 0

# Ensure window titles get renamed automatically.
setw -g automatic-rename

# Default names are too vague to see. Let me name it.
# set-option -wg automatic-rename off

