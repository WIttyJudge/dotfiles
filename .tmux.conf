# }}}


# 2. Appereance and Preferences {{{
# ========================================

# Enable mouse support
set -g mouse on 

# Enable color support inside of tmux.
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",*256col*:Tc"

# let pane/window numbers be 1-indexed
set-option -g base-index 1
set-option -g pane-base-index 1

# Tmux adds a short, almost imperceptible delay between the commands that can 
# cause funny behavior when running vim inside tmux.
set-option -s escape-time 0

# Status Bar
source-file ~/.config/tmux/gruvbox-theme.conf

# Vim-like pane switching
# bind -r ^ last-window
# bind -r k select-pane -U
# bind -r j select-pane -D
# bind -r h select-pane -L
# bind -r l select-pane -R

# }}}

# -----------------------------------------------------------------------------
# Plugin Manager - https://github.com/tmux-plugins/tpm
# If you didn't use my dotfiles install script you'll need to:
#   Step 1) git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#   Step 2) Reload tmux if it's already started with `r
#   Step 3) Launch tmux and hit `I (capital i) to fetch any plugins
# -----------------------------------------------------------------------------

# List of plugins.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# save neovim sessions
set -g @resurrect-strategy-nvim 'session'

# Initialize TPM (keep this line at the very bottom of your tmux.conf).
run '~/.tmux/plugins/tpm/tpm'
